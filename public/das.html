<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAS — Meu Imposto</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="app-conteudo">
    <header class="topbar" id="topbar"></header>
    <main class="app-main">

      <div class="page-header">
        <div class="titulo">
          <div class="icone"><i data-lucide="calculator"></i></div>
          <div><h1>Calculadora de DAS</h1><p>Documento de Arrecadacao do Simples Nacional para o MEI.</p></div>
        </div>
      </div>

      <div class="card card-shadow flex items-center gap-4 mb-5 flex-wrap">
        <div class="kpi-icone roxo"><i data-lucide="building-2"></i></div>
        <div class="flex-1" id="atividadeBox"></div>
        <span class="badge badge-roxo" id="tipoBadge">Tipo: —</span>
      </div>

      <div class="grid mb-5" style="grid-template-columns: 1.2fr 1fr; gap: 20px">
        <div class="card card-shadow text-center" style="padding: 36px; background: linear-gradient(to bottom right, #fff, #f3f1fa)">
          <div class="text-xs uppercase font-bold text-suave">DAS deste mes</div>
          <div class="text-roxo font-extrabold tabular" style="font-size: 56px; margin: 12px 0" id="dasTotal"></div>
          <div class="text-amarelo font-semibold" id="dasVenc"></div>
          <button class="btn btn-primary btn-lg mt-5" id="btnGerar">📄 Gerar guia do mes</button>
        </div>

        <div class="card card-shadow">
          <h3 class="mb-3">Detalhamento</h3>
          <div id="detalheDas"></div>
          <div class="flex justify-between mt-3" style="border-top:2px solid var(--borda); padding-top: 12px">
            <b>Total</b>
            <b class="tabular text-lg" id="dasTotal2"></b>
          </div>
        </div>
      </div>

      <div class="card card-shadow" style="padding:0">
        <div class="p-5" style="border-bottom:1px solid var(--borda)">
          <h3>Historico</h3>
          <p class="text-xs text-suave">Ultimos 6 DAS gerados</p>
        </div>
        <div style="overflow-x:auto">
          <table class="tabela">
            <thead><tr><th>Competencia</th><th>Vencimento</th><th>Valor</th><th>Status</th></tr></thead>
            <tbody id="hist"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/shell.js"></script>
<script>
(async function () {
  renderShell({ pagina: 'das.html', titulo: 'DAS' });

  var perfil, das, hist;
  try {
    var r = await Promise.all([api.get('/perfil'), api.get('/das/atual'), api.get('/das/historico')]);
    perfil = r[0].perfil || {}; das = r[1]; hist = (r[2] && r[2].guias) || [];
  } catch (e) { erroCarregar(document.getElementById('detalheDas'), e); return; }

  var cnae = perfil.cnae || '—';
  var cnaeDesc = perfil.cnae_desc || 'Atividade nao informada';
  document.getElementById('atividadeBox').innerHTML =
    '<div class="text-xs text-suave font-semibold">Atividade</div>' +
    '<div class="font-bold">' + cnae + ' — ' + cnaeDesc + '</div>';
  document.getElementById('tipoBadge').textContent = 'Tipo: ' + (das.tipo || '—');

  var vencBR = dataBR(das.vencimento);
  document.getElementById('dasTotal').textContent = brl(das.total);
  document.getElementById('dasTotal2').textContent = brl(das.total);
  document.getElementById('dasVenc').textContent = 'Vence em ' + vencBR + ' (' + diasAte(das.vencimento) + ' dias)';
  var detalhes = [
    { label: 'INSS', desc: '5% do salario minimo', valor: das.inss },
    { label: 'ISS', desc: 'Apenas servicos', valor: das.iss },
    { label: 'ICMS', desc: 'Comercio e industria', valor: das.icms }
  ];
  var dh = '';
  for (var i = 0; i < detalhes.length; i++) {
    var d = detalhes[i];
    dh += '<div class="flex justify-between items-center p-3 mb-2" style="border:1px solid var(--borda); border-radius:10px">' +
      '<div><div class="font-bold text-roxo">' + d.label + '</div><div class="text-xs text-suave">' + d.desc + '</div></div>' +
      '<div class="font-bold tabular">' + brl(d.valor) + '</div></div>';
  }
  document.getElementById('detalheDas').innerHTML = dh;

  function renderHist(guias) {
    var hh = '';
    for (var i = 0; i < guias.length; i++) {
      var h = guias[i];
      var pago = h.status === 'pago';
      var cor = pago ? 'badge-verde' : 'badge-amarelo';
      hh += '<tr><td class="font-semibold">' + dataBR(h.competencia) + '</td><td class="tabular">' + dataBR(h.vencimento) + '</td><td class="font-bold tabular">' + brl(Number(h.valor)) + '</td><td><span class="badge ' + cor + '">' + (pago ? 'Pago' : 'Pendente') + '</span></td></tr>';
    }
    document.getElementById('hist').innerHTML = hh || '<tr><td colspan="4" class="text-center text-suave" style="padding:20px">Nenhuma guia gerada ainda.</td></tr>';
  }
  renderHist(hist);

  document.getElementById('btnGerar').addEventListener('click', async function () {
    var b = this; b.disabled = true; b.textContent = 'Gerando...';
    try {
      await api.post('/das/gerar', {});
      var nova = await api.get('/das/historico');
      renderHist((nova && nova.guias) || []);
      toast('Guia do mes gerada!', { desc: 'Adicionada ao historico.' });
    } catch (e) { toast('Erro ao gerar', { desc: e.message, tipo: 'erro' }); }
    b.disabled = false; b.textContent = '📄 Gerar guia do mes';
  });

  lucide.createIcons();
})();
</script>
</body>
</html>
