<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Meu Imposto</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="app-conteudo">
    <header class="topbar" id="topbar"></header>
    <main class="app-main">

      <div class="page-header">
        <div class="titulo">
          <div class="icone"><i data-lucide="trending-up"></i></div>
          <div><h1>Painel administrativo</h1><p>Visao geral da plataforma Meu Imposto.</p></div>
        </div>
      </div>

      <div class="grid grid-4 mb-5" id="kpis"></div>

      <div class="grid" style="grid-template-columns: 1.5fr 1fr; gap: 20px">
        <div class="card card-shadow"><h3 class="mb-3">Crescimento de usuarios</h3><div style="height:280px"><canvas id="g1"></canvas></div></div>
        <div class="card card-shadow"><h3 class="mb-3">Funcionalidades mais usadas</h3><div id="topF"></div></div>
      </div>

    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/shell.js"></script>
<script>
  renderShell({ pagina: 'admin.html', titulo: 'Admin', admin: true });
  document.getElementById('kpis').innerHTML =
    '<div class="kpi"><div><div class="kpi-label">Total de usuarios</div><div class="kpi-valor">' + numero(adminMetricas.totalUsuarios) + '</div></div><div class="kpi-icone roxo">👥</div></div>' +
    '<div class="kpi"><div><div class="kpi-label">Ativos hoje</div><div class="kpi-valor text-verde">' + numero(adminMetricas.ativosHoje) + '</div></div><div class="kpi-icone verde">⚡</div></div>' +
    '<div class="kpi"><div><div class="kpi-label">DAS calculados (mes)</div><div class="kpi-valor">' + numero(adminMetricas.dasCalculados) + '</div></div><div class="kpi-icone amarelo">📄</div></div>' +
    '<div class="kpi"><div><div class="kpi-label">NFS-e emitidas</div><div class="kpi-valor">' + numero(adminMetricas.nfseEmitidas) + '</div></div><div class="kpi-icone amarelo">📑</div></div>';
  new Chart(document.getElementById('g1'), {
    type: 'line',
    data: { labels: adminMetricas.crescimento.map(function(c) { return c.mes; }), datasets: [{ label: 'Usuarios', data: adminMetricas.crescimento.map(function(c) { return c.usuarios; }), borderColor: '#1e1b6b', borderWidth: 3, tension: 0.35, pointRadius: 5 }] },
    options: { responsive: true, maintainAspectRatio: false }
  });
  var max = adminMetricas.topFeatures[0].usos;
  var th = '';
  for (var i = 0; i < adminMetricas.topFeatures.length; i++) {
    var f = adminMetricas.topFeatures[i];
    th += '<div class="mb-3"><div class="flex justify-between text-sm mb-1"><span class="font-semibold"><span class="text-suave">#' + (i+1) + '</span> ' + f.nome + '</span><span class="font-bold tabular">' + numero(f.usos) + '</span></div>';
    th += '<div class="progress" style="height:8px"><div class="progress-bar verde" style="width:' + ((f.usos/max)*100) + '%; background: linear-gradient(to right, var(--roxo), var(--roxo-claro))"></div></div></div>';
  }
  document.getElementById('topF').innerHTML = th;
  lucide.createIcons();
</script>
</body>
</html>
