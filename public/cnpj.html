<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar CNPJ — Meu Imposto</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="app-conteudo">
    <header class="topbar" id="topbar"></header>
    <main class="app-main">

      <div class="page-header">
        <div class="titulo">
          <div class="icone"><i data-lucide="search"></i></div>
          <div><h1>Consultar CNPJ</h1><p>Busque dados completos de qualquer empresa brasileira.</p></div>
        </div>
      </div>

      <div class="card card-shadow mb-5 flex gap-3 flex-wrap">
        <input class="input flex-1 text-lg tabular" id="cnpj" placeholder="00.000.000/0000-00" style="height:48px">
        <button class="btn btn-primary" id="btn" disabled onclick="consultar()" style="height:48px">🔍 Consultar</button>
      </div>

      <div id="resultado"></div>

    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/shell.js"></script>
<script>
  renderShell({ pagina: 'cnpj.html', titulo: 'Consultar CNPJ' });
  document.getElementById('cnpj').addEventListener('input', function (e) {
    e.target.value = mascaraCNPJ(e.target.value);
    document.getElementById('btn').disabled = e.target.value.replace(/\D/g, '').length !== 14;
  });
  async function consultar() {
    var btn = document.getElementById('btn');
    var cnpj = document.getElementById('cnpj').value.replace(/\D/g, '');
    btn.disabled = true; btn.textContent = 'Consultando...';
    var d;
    try {
      d = await api.get('/cnpj/' + cnpj);
    } catch (err) {
      document.getElementById('resultado').innerHTML = '';
      toast('Nao encontrado', { desc: err.message, tipo: 'erro' });
      btn.textContent = '🔍 Consultar'; btn.disabled = false;
      return;
    }
    btn.textContent = '🔍 Consultar'; btn.disabled = false;

    var bruto = d.bruto || {};
    var permitidoMEI = bruto.opcao_pelo_mei === true;
    var capital = (bruto.capital_social != null) ? brl(Number(bruto.capital_social)) : '—';
    var html = '<div class="card card-shadow">';
    html += '<div class="flex justify-between items-start mb-4" style="border-bottom:1px solid var(--borda);padding-bottom:16px">';
    html += '<div class="flex gap-3 items-start"><div class="kpi-icone roxo" style="background:var(--roxo);color:#fff">🏢</div>';
    html += '<div><h2 class="text-xl font-extrabold">' + (d.razaoSocial || '—') + '</h2>';
    html += '<p class="text-sm text-suave">' + (d.nomeFantasia || '') + '</p>';
    html += '<p class="text-xs text-suave tabular mt-1">' + mascaraCNPJ(cnpj) + '</p></div></div>';
    html += '<span class="badge ' + ((d.situacao || '').toUpperCase() === 'ATIVA' ? 'badge-verde' : 'badge-amarelo') + '">' + (d.situacao || '—') + '</span></div>';
    html += '<div class="grid grid-2 mb-4"><div><div class="text-xs text-suave font-semibold">Abertura</div><div class="font-bold tabular">📅 ' + dataBR(d.abertura) + '</div></div>';
    html += '<div><div class="text-xs text-suave font-semibold">Capital social</div><div class="font-bold tabular">' + capital + '</div></div>';
    html += '<div style="grid-column:span 2"><div class="text-xs text-suave font-semibold">Endereco</div><div class="font-semibold">📍 ' + (d.endereco || '—') + '</div></div></div>';
    html += '<div class="mb-4"><div class="text-xs text-suave font-semibold mb-1">CNAE principal</div><div class="font-bold">' + (d.cnae || '—') + ' — ' + (d.cnaeDesc || '') + '</div></div>';
    if (permitidoMEI) {
      html += '<div class="sucesso-box flex gap-3 items-center"><span style="font-size:20px">✅</span><b>Optante pelo MEI / Simples Nacional</b></div>';
    } else {
      html += '<div class="aviso-box flex gap-3 items-center"><span style="font-size:20px">ℹ️</span><b>Nao consta como optante pelo MEI</b></div>';
    }
    html += '</div>';
    document.getElementById('resultado').innerHTML = html;
  }
  lucide.createIcons();
</script>
</body>
</html>
