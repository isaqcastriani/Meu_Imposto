<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutoriais — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="app-conteudo">
    <header class="topbar" id="topbar"></header>
    <main class="app-main">

      <div class="page-header">
        <div class="titulo">
          <div class="icone"><i data-lucide="book-open"></i></div>
          <div><h1>Gestao de tutoriais</h1><p>Crie, edite e publique conteudos para os MEIs.</p></div>
        </div>
        <button class="btn btn-primary" id="btnNovo">+ Novo tutorial</button>
      </div>

      <div class="card card-shadow" style="padding:0; overflow-x:auto">
        <table class="tabela">
          <thead><tr><th>Titulo</th><th>Categoria</th><th>Nivel</th><th>Tempo</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/shell.js"></script>
<script>
(async function () {
  renderShell({ pagina: 'admin-tutoriais.html', titulo: 'Tutoriais', admin: true });

  async function carregar() {
    var lista;
    try { lista = (await api.get('/tutoriais')).tutoriais || []; }
    catch (e) { erroCarregar(document.getElementById('tbody').parentElement, e); return; }
    var html = '';
    for (var i = 0; i < lista.length; i++) {
      var t = lista[i];
      html += '<tr><td class="font-semibold">' + t.titulo + '</td><td><span class="badge badge-outline">' + t.categoria + '</span></td>';
      html += '<td>' + (t.dificuldade || '—') + '</td><td class="tabular">' + (t.tempo || '—') + '</td>';
      html += '<td class="text-right"><button class="btn btn-ghost btn-icon" style="color:var(--vermelho)" onclick="remover(\'' + t.id + '\')">🗑</button></td></tr>';
    }
    document.getElementById('tbody').innerHTML = html || '<tr><td colspan="5" class="text-center text-suave" style="padding:24px">Nenhum tutorial.</td></tr>';
    lucide.createIcons();
  }

  document.getElementById('btnNovo').addEventListener('click', async function () {
    var titulo = prompt('Titulo do tutorial:'); if (!titulo) return;
    var categoria = prompt('Categoria (ex: Imposto, NFS-e, Cadastro):', 'Outros') || 'Outros';
    try {
      await api.post('/admin/tutoriais', { titulo: titulo, categoria: categoria });
      toast('Tutorial criado'); carregar();
    } catch (e) { toast('Erro', { desc: e.message, tipo: 'erro' }); }
  });

  window.remover = async function (id) {
    if (!confirm('Remover este tutorial?')) return;
    try { await api.del('/admin/tutoriais/' + id); toast('Removido'); carregar(); }
    catch (e) { toast('Erro', { desc: e.message, tipo: 'erro' }); }
  };

  carregar();
})();
</script>
</body>
</html>
