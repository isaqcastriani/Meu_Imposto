<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="app-conteudo">
    <header class="topbar" id="topbar"></header>
    <main class="app-main">

      <div class="page-header">
        <div class="titulo">
          <div class="icone"><i data-lucide="users"></i></div>
          <div><h1>Gestao de usuarios</h1><p id="subt"></p></div>
        </div>
      </div>

      <div class="card card-shadow" style="padding:0">
        <div class="p-4 flex gap-2 flex-wrap" style="border-bottom:1px solid var(--borda)">
          <input class="input flex-1" id="q" placeholder="🔍 Buscar por nome, e-mail ou CNPJ..." oninput="render()" style="min-width:200px">
          <select class="select" style="width:auto"><option>Todos</option><option>Ativos</option><option>Inativos</option></select>
        </div>
        <div style="overflow-x:auto">
          <table class="tabela">
            <thead><tr><th>Nome</th><th>E-mail</th><th>CNPJ</th><th>Cadastro</th><th>Status</th><th></th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/shell.js"></script>
<script>
(async function () {
  renderShell({ pagina: 'admin-usuarios.html', titulo: 'Usuarios', admin: true });

  var usuarios = [];
  try { usuarios = (await api.get('/admin/usuarios')).usuarios || []; }
  catch (e) { erroCarregar(document.getElementById('tbody').parentElement, e); return; }
  document.getElementById('subt').textContent = usuarios.length + ' usuarios cadastrados';

  window.render = function () {
    var q = document.getElementById('q').value.toLowerCase();
    var lista = usuarios.filter(function (u) {
      return (u.nome || '').toLowerCase().indexOf(q) !== -1 || (u.email || '').indexOf(q) !== -1 || (u.cnpj || '').indexOf(q) !== -1;
    });
    var html = '';
    for (var i = 0; i < lista.length; i++) {
      var u = lista[i];
      var ativo = u.status === 'ativo';
      var acao = ativo
        ? '<button class="btn btn-ghost btn-sm" onclick="toggle(\'' + u.id + '\',\'inativo\')">Desativar</button>'
        : '<button class="btn btn-ghost btn-sm" onclick="toggle(\'' + u.id + '\',\'ativo\')" style="color:var(--verde)">Ativar</button>';
      html += '<tr><td class="font-semibold">' + (u.nome || '—') + '</td><td class="text-sm text-suave">' + (u.email || '') + '</td><td class="tabular text-xs">' + (u.cnpj || '—') + '</td><td class="tabular text-xs">' + dataBR(u.created_at) + '</td>';
      html += '<td><span class="badge ' + (ativo ? 'badge-verde' : 'badge-cinza') + '">' + (ativo ? 'Ativo' : 'Inativo') + '</span></td>';
      html += '<td class="text-right">' + acao + '</td></tr>';
    }
    document.getElementById('tbody').innerHTML = html || '<tr><td colspan="6" class="text-center text-suave" style="padding:24px">Nenhum usuario encontrado.</td></tr>';
  };

  window.toggle = async function (id, status) {
    try {
      await api.patch('/admin/usuarios/' + id + '/status', { status: status });
      var alvo = usuarios.find(function (u) { return u.id === id; });
      if (alvo) alvo.status = status;
      render();
      toast('Status atualizado');
    } catch (e) { toast('Erro', { desc: e.message, tipo: 'erro' }); }
  };

  render();
  lucide.createIcons();
})();
</script>
</body>
</html>
