<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metricas — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="app-conteudo">
    <header class="topbar" id="topbar"></header>
    <main class="app-main">

      <div class="page-header">
        <div class="titulo">
          <div class="icone"><i data-lucide="bar-chart-3"></i></div>
          <div><h1>Metricas detalhadas</h1><p>Analises profundas de uso da plataforma.</p></div>
        </div>
      </div>

      <div class="grid grid-4 mb-5" id="kpis"></div>

      <div class="grid grid-2 mb-5">
        <div class="card card-shadow"><h3 class="mb-3">Resumo da plataforma</h3><div id="funil"></div></div>
        <div class="card card-shadow"><h3 class="mb-3">Crescimento (6 meses)</h3><div style="height:280px"><canvas id="g1"></canvas></div></div>
      </div>

    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/shell.js"></script>
<script>
(async function () {
  renderShell({ pagina: 'admin-metricas.html', titulo: 'Metricas', admin: true });

  var m;
  try { m = await api.get('/admin/metricas'); }
  catch (e) { erroCarregar(document.getElementById('kpis'), e); return; }

  document.getElementById('kpis').innerHTML =
    '<div class="kpi"><div><div class="kpi-label">Total de usuarios</div><div class="kpi-valor text-verde">' + numero(m.totalUsuarios) + '</div></div><div class="kpi-icone verde">👥</div></div>' +
    '<div class="kpi"><div><div class="kpi-label">Ativos (24h)</div><div class="kpi-valor">' + numero(m.ativosHoje) + '</div></div><div class="kpi-icone roxo">⚡</div></div>' +
    '<div class="kpi"><div><div class="kpi-label">DAS gerados</div><div class="kpi-valor">' + numero(m.dasCalculados) + '</div></div><div class="kpi-icone amarelo">📄</div></div>' +
    '<div class="kpi"><div><div class="kpi-label">NFS-e emitidas</div><div class="kpi-valor">' + numero(m.nfseEmitidas) + '</div></div><div class="kpi-icone amarelo">📑</div></div>';

  document.getElementById('funil').innerHTML =
    '<div class="flex justify-between p-3 mb-2" style="border:1px solid var(--borda);border-radius:10px"><span class="font-semibold">Usuarios MEI cadastrados</span><b class="tabular">' + numero(m.totalUsuarios) + '</b></div>' +
    '<div class="flex justify-between p-3 mb-2" style="border:1px solid var(--borda);border-radius:10px"><span class="font-semibold">Ativos nas ultimas 24h</span><b class="tabular">' + numero(m.ativosHoje) + '</b></div>' +
    '<div class="flex justify-between p-3 mb-2" style="border:1px solid var(--borda);border-radius:10px"><span class="font-semibold">Guias DAS geradas</span><b class="tabular">' + numero(m.dasCalculados) + '</b></div>' +
    '<div class="flex justify-between p-3" style="border:1px solid var(--borda);border-radius:10px"><span class="font-semibold">NFS-e emitidas</span><b class="tabular">' + numero(m.nfseEmitidas) + '</b></div>';

  var cresc = m.crescimento || [];
  new Chart(document.getElementById('g1'), {
    type: 'line',
    data: { labels: cresc.map(function (c) { return c.mes; }), datasets: [{ label: 'Usuarios', data: cresc.map(function (c) { return c.usuarios; }), borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, borderWidth: 2.5, tension: 0.35 }] },
    options: { responsive: true, maintainAspectRatio: false }
  });
  lucide.createIcons();
})();
</script>
</body>
</html>
