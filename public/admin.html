<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Meu Imposto</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="app-conteudo">
    <header class="topbar" id="topbar"></header>
    <main class="app-main">

      <div class="page-header">
        <div class="titulo">
          <div class="icone"><i data-lucide="trending-up"></i></div>
          <div><h1>Painel administrativo</h1><p>Visao geral da plataforma Meu Imposto.</p></div>
        </div>
      </div>

      <div class="grid grid-4 mb-5" id="kpis"></div>

      <div class="grid" style="grid-template-columns: 1.5fr 1fr; gap: 20px">
        <div class="card card-shadow"><h3 class="mb-3">Crescimento de usuarios</h3><div style="height:280px"><canvas id="g1"></canvas></div></div>
        <div class="card card-shadow"><h3 class="mb-3">Funcionalidades mais usadas</h3><div id="topF"></div></div>
      </div>

    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/shell.js"></script>
<script>
(async function () {
  renderShell({ pagina: 'admin.html', titulo: 'Admin', admin: true });

  var m;
  try { m = await api.get('/admin/metricas'); }
  catch (e) { erroCarregar(document.getElementById('kpis'), e); return; }

  document.getElementById('kpis').innerHTML =
    '<div class="kpi"><div><div class="kpi-label">Total de usuarios</div><div class="kpi-valor">' + numero(m.totalUsuarios) + '</div></div><div class="kpi-icone roxo">👥</div></div>' +
    '<div class="kpi"><div><div class="kpi-label">Ativos (24h)</div><div class="kpi-valor text-verde">' + numero(m.ativosHoje) + '</div></div><div class="kpi-icone verde">⚡</div></div>' +
    '<div class="kpi"><div><div class="kpi-label">DAS gerados</div><div class="kpi-valor">' + numero(m.dasCalculados) + '</div></div><div class="kpi-icone amarelo">📄</div></div>' +
    '<div class="kpi"><div><div class="kpi-label">NFS-e emitidas</div><div class="kpi-valor">' + numero(m.nfseEmitidas) + '</div></div><div class="kpi-icone amarelo">📑</div></div>';

  var cresc = m.crescimento || [];
  new Chart(document.getElementById('g1'), {
    type: 'line',
    data: { labels: cresc.map(function (c) { return c.mes; }), datasets: [{ label: 'Usuarios', data: cresc.map(function (c) { return c.usuarios; }), borderColor: '#1e1b6b', borderWidth: 3, tension: 0.35, pointRadius: 5 }] },
    options: { responsive: true, maintainAspectRatio: false }
  });

  // Resumo simples no lugar das "features" (metrica nao coletada no backend).
  document.getElementById('topF').innerHTML =
    '<div class="kpi mb-2"><div><div class="kpi-label">Usuarios MEI</div><div class="kpi-valor">' + numero(m.totalUsuarios) + '</div></div></div>' +
    '<div class="kpi mb-2"><div><div class="kpi-label">DAS gerados</div><div class="kpi-valor">' + numero(m.dasCalculados) + '</div></div></div>' +
    '<div class="kpi"><div><div class="kpi-label">NFS-e emitidas</div><div class="kpi-valor">' + numero(m.nfseEmitidas) + '</div></div></div>';
  lucide.createIcons();
})();
</script>
</body>
</html>
