<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial — Meu Imposto</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="app-conteudo">
    <header class="topbar" id="topbar"></header>
    <main class="app-main">

      <a class="btn btn-ghost mb-4" href="tutoriais.html" style="display:inline-flex">← Todos os tutoriais</a>

      <div class="grid" style="grid-template-columns: 1fr 240px; gap: 32px" id="conteudo"></div>

    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/shell.js"></script>
<script>
(async function () {
  renderShell({ pagina: 'tutoriais.html', titulo: 'Tutoriais' });
  var id = getParam('id');
  var t;
  try { t = (await api.get('/tutoriais/' + id)).tutorial; }
  catch (e) { erroCarregar(document.getElementById('conteudo'), e); return; }

  var html = '<div>';
  html += '<span class="badge badge-outline mb-3" style="display:inline-block">' + (t.categoria || '') + '</span>';
  html += '<h1 class="text-3xl font-extrabold">' + t.titulo + '</h1>';
  html += '<p class="text-suave mt-2">Tempo estimado: ' + (t.tempo || '—') + ' · Dificuldade: ' + (t.dificuldade || '—') + '</p>';
  html += '<div class="card card-shadow mt-5" style="padding:24px">';
  if (t.conteudo) {
    // Conteudo real (texto). Quebras de linha viram paragrafos.
    var paras = String(t.conteudo).split(/\n{2,}/);
    for (var i = 0; i < paras.length; i++) {
      html += '<p class="mt-3" style="line-height:1.7">' + paras[i].replace(/\n/g, '<br>') + '</p>';
    }
  } else {
    html += '<p class="text-suave">O conteudo completo deste tutorial sera publicado em breve.</p>';
  }
  html += '</div>';
  html += '<div class="card muted-bg mt-5 flex justify-between items-center"><p class="font-semibold text-sm">Esse tutorial foi util?</p>';
  html += '<div class="flex gap-2"><button class="btn btn-outline btn-sm" onclick="toast(\'Obrigado pelo feedback!\')">👍 Sim</button><button class="btn btn-outline btn-sm" onclick="toast(\'Vamos melhorar!\')">👎 Nao</button></div></div>';
  html += '</div>';
  html += '<aside><div class="card" style="position:sticky; top:80px"><div class="text-xs uppercase font-bold text-suave mb-3">Sobre</div>';
  html += '<div class="text-sm text-suave">Categoria: <b class="text-roxo">' + (t.categoria || '—') + '</b></div>';
  html += '<div class="text-sm text-suave mt-1">Duracao: <b>' + (t.tempo || '—') + '</b></div>';
  html += '<div class="text-sm text-suave mt-1">Nivel: <b>' + (t.dificuldade || '—') + '</b></div></div></aside>';
  document.getElementById('conteudo').innerHTML = html;
  lucide.createIcons();
})();
</script>
</body>
</html>
