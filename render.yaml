# Blueprint de deploy no Render (https://render.com)
# Dois servicos:
#   - meu-imposto-api : backend Node/Express (porta dinamica, conecta no Supabase)
#   - meu-imposto-web : frontend estatico (Vite build -> dist/), servido em CDN (nao dorme)
# O Render ja sincroniza este arquivo automaticamente a cada push na main.
# Apenas DATABASE_URL e JWT_SECRET (sync:false) precisam ser colados no painel.
services:
  # ---------- Backend (API) ----------
  - type: web
    name: meu-imposto-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Origens liberadas no CORS (o front estatico + o Pages antigo, por seguranca).
      - key: CORS_ORIGIN
        value: https://meu-imposto-web.onrender.com,https://isaqcastriani.github.io
      - key: DATABASE_URL
        sync: false   # cole no painel do Render (o mesmo do .env, com %40 na senha)
      - key: JWT_SECRET
        sync: false   # cole no painel do Render (o mesmo do .env)

  # ---------- Frontend (site estatico) ----------
  - type: web
    name: meu-imposto-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    # Garante que recarregar uma pagina (ex.: /dashboard.html) nunca caia em 404
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
