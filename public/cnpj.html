<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar CNPJ — Meu Imposto</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="app-conteudo">
    <header class="topbar" id="topbar"></header>
    <main class="app-main">

      <div class="page-header">
        <div class="titulo">
          <div class="icone"><i data-lucide="search"></i></div>
          <div><h1>Consultar CNPJ</h1><p>Busque dados completos de qualquer empresa brasileira.</p></div>
        </div>
      </div>

      <div class="card card-shadow mb-5 flex gap-3 flex-wrap">
        <input class="input flex-1 text-lg tabular" id="cnpj" placeholder="00.000.000/0000-00" style="height:48px">
        <button class="btn btn-primary" id="btn" disabled onclick="consultar()" style="height:48px">🔍 Consultar</button>
      </div>

      <div id="resultado"></div>

    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/shell.js"></script>
<script>
  renderShell({ pagina: 'cnpj.html', titulo: 'Consultar CNPJ' });
  document.getElementById('cnpj').addEventListener('input', function(e) {
    e.target.value = mascaraCNPJ(e.target.value);
    document.getElementById('btn').disabled = e.target.value.replace(/\D/g, '').length !== 14;
  });
  function consultar() {
    var btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = 'Consultando...';
    setTimeout(function() {
      btn.textContent = '🔍 Consultar'; btn.disabled = false;
      var html = '<div class="card card-shadow">';
      html += '<div class="flex justify-between items-start mb-4" style="border-bottom:1px solid var(--borda);padding-bottom:16px">';
      html += '<div class="flex gap-3 items-start"><div class="kpi-icone roxo" style="background:var(--roxo);color:#fff">🏢</div>';
      html += '<div><h2 class="text-xl font-extrabold">' + usuarioMEI.razaoSocial + '</h2>';
      html += '<p class="text-sm text-suave">' + usuarioMEI.nomeFantasia + '</p>';
      html += '<p class="text-xs text-suave tabular mt-1">' + document.getElementById('cnpj').value + '</p></div></div>';
      html += '<span class="badge badge-verde">ATIVA</span></div>';
      html += '<div class="grid grid-2 mb-4"><div><div class="text-xs text-suave font-semibold">Abertura</div><div class="font-bold tabular">📅 ' + usuarioMEI.abertura + '</div></div>';
      html += '<div><div class="text-xs text-suave font-semibold">Capital social</div><div class="font-bold tabular">R$ 1.000,00</div></div>';
      html += '<div style="grid-column:span 2"><div class="text-xs text-suave font-semibold">Endereco</div><div class="font-semibold">📍 ' + usuarioMEI.endereco + '</div></div></div>';
      html += '<div class="mb-4"><div class="text-xs text-suave font-semibold mb-1">CNAE principal</div><div class="font-bold">' + usuarioMEI.cnae + ' — ' + usuarioMEI.cnaeDesc + '</div></div>';
      html += '<div class="mb-4"><div class="text-xs text-suave font-semibold mb-2">CNAEs secundarios</div>';
      html += '<ul style="list-style:none;padding:0;font-size:14px"><li class="text-suave">• 6202-3/00 - Desenvolvimento e licenciamento de programas customizaveis</li><li class="text-suave">• 6311-9/00 - Tratamento de dados</li></ul></div>';
      html += '<div class="sucesso-box flex gap-3 items-center"><span style="font-size:20px">✅</span><b>Atividade permitida para MEI</b></div>';
      html += '</div>';
      document.getElementById('resultado').innerHTML = html;
    }, 1100);
  }
  lucide.createIcons();
</script>
</body>
</html>
